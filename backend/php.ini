[PHP]
; Production settings for Railway deployment
display_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On

max_execution_time = 300
memory_limit = 512M
post_max_size = 100M
upload_max_filesize = 100M

; Required extensions (loaded by nixpacks on Railway)
; On Windows local dev, extensions are loaded from the system php.ini
