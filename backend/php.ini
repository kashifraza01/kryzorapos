[PHP]
; Use relative path for extensions - usually 'ext' in the PHP install folder
extension_dir = "ext"

; Core Extensions
extension = pdo_sqlite
extension = sqlite3
extension = mbstring
extension = openssl
extension = curl
extension = fileinfo
extension = gd
extension = intl
extension = zip
;extension = bcmath

; Settings
display_errors = On
error_reporting = E_ALL
max_execution_time = 300
memory_limit = 512M
post_max_size = 100M
upload_max_filesize = 100M

; Local Environment Fix for Windows
; Ensure we don't try to load things from absolute paths that might not exist
