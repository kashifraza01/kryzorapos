# Nixpacks configuration for Railway deployment
# This runs from REPO ROOT — all commands must cd into backend/

providers = []

[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.mbstring", "php83Extensions.openssl", "php83Extensions.curl", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.zip"]

[phases.install]
cmds = ["cd backend && composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
    "cd backend && mkdir -p storage/framework/{sessions,views,cache}",
    "cd backend && mkdir -p storage/logs",
    "cd backend && mkdir -p bootstrap/cache"
]

[start]
cmd = "cd backend && bash start.sh"
