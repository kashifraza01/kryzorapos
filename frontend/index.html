<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KryzoraPOS | by Kryzora Solutions</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      // CRITICAL: Kill old service worker cache that blocks new deploys
      if ('serviceWorker' in navigator) {
        // Register the new self-destruct SW to replace the old caching one
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(reg => { reg.update(); })
          .catch(() => {});
        // Also unregister everything
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let reg of regs) { reg.unregister(); }
        });
        // Clear all caches
        if (typeof caches !== 'undefined') {
          caches.keys().then(names => {
            names.forEach(name => caches.delete(name));
          });
        }
      }
    </script>
    <style>
      body { margin: 0; background: #0f172a; height: 100vh; font-family: system-ui, sans-serif; }
      #root { height: 100%; width: 100%; }
      #root:empty { position: absolute; top: calc(50% - 24px); left: calc(50% - 24px); width: 48px; height: 48px; border: 4px solid #FF4D4D; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
      @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
