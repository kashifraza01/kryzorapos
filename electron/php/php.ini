[PHP]
; KryzoraPOS Bundled PHP Configuration
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
implicit_flush = Off
serialize_precision = -1
zend.enable_gc = On
expose_php = Off
max_execution_time = 300
max_input_time = 60
memory_limit = 256M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
ignore_repeated_errors = Off
html_errors = Off
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On
post_max_size = 50M
default_mimetype = "text/html"
default_charset = "UTF-8"
enable_dl = Off
file_uploads = On
upload_max_filesize = 50M
max_file_uploads = 20
date.timezone = "Asia/Karachi"

; Extension directory
extension_dir = "ext"

; Only load extensions that are NOT built-in
; Built-in (DO NOT load): ctype, dom, filter, session, xml, xmlwriter, tokenizer, fileinfo
extension=curl
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3

[Session]
session.save_handler = files
session.save_path = ""
session.use_strict_mode = 0
session.use_cookies = 1
session.cookie_httponly = 1
session.gc_maxlifetime = 1440
session.gc_probability = 1
session.gc_divisor = 1000

[opcache]
opcache.enable=0
